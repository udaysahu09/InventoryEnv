<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventoryEnv - Supply Chain Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 40px; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .controls { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background: #667eea; color: white; padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; transition: 0.3s; width: 100%; }
        button:hover { background: #764ba2; }
        .results { background: #f9f9f9; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #667eea; color: white; font-weight: 600; }
        tr:hover { background: #f0f0f0; }
        .summary { background: #e8f5e9; padding: 15px; border-radius: 6px; border-left: 4px solid #4caf50; }
        .error { background: #ffebee; padding: 15px; border-radius: 6px; border-left: 4px solid #f44336; color: #c62828; }
        .loading { text-align: center; color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 InventoryEnv - AI Supply Chain Simulator</h1>
        <p class="subtitle">Optimize warehouse inventory with intelligent decision-making</p>
        
        <div class="controls">
            <div class="control-group">
                <label for="task">📦 Difficulty Level</label>
                <select id="task">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div class="control-group">
                <label for="maxSteps">⏱️ Max Steps</label>
                <input type="number" id="maxSteps" value="50" min="10" max="100" step="5">
            </div>
            <button onclick="runSimulation()">🚀 Run Simulation</button>
        </div>
        
        <div class="results" id="resultsDiv" style="display:none;">
            <h2>📊 Results</h2>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Day</th>
                        <th>Stock</th>
                        <th>Pending</th>
                        <th>Fulfilled</th>
                        <th>Revenue</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
            <div class="summary" id="summaryDiv"></div>
        </div>
        <div id="loadingDiv" class="loading" style="display:none;">⏳ Running simulation...</div>
        <div id="errorDiv"></div>
    </div>

    <script>
        async function runSimulation() {
            const task = document.getElementById('task').value;
            const maxSteps = document.getElementById('maxSteps').value;
            
            document.getElementById('resultsDiv').style.display = 'none';
            document.getElementById('loadingDiv').style.display = 'block';
            document.getElementById('errorDiv').innerHTML = '';
            
            try {
                // Reset
                const resetRes = await fetch('/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task })
                });
                
                if (!resetRes.ok) throw new Error('Reset failed');
                const resetData = await resetRes.json();
                let observation = resetData.observation;
                
                const results = [];
                
                // Run steps
                for (let step = 0; step < maxSteps; step++) {
                    const stock = observation.stock_levels?.[0] || 0;
                    const pending = observation.pending_orders?.[0] || 0;
                    const warehouseUsed = observation.warehouse_used || 0;
                    const warehouseCapacity = observation.warehouse_capacity || 200;
                    
                    let orderQty = 0;
                    if (stock < 10) orderQty = Math.min(100, warehouseCapacity - warehouseUsed);
                    else if (stock < 20 && pending > 5) orderQty = Math.min(80, warehouseCapacity - warehouseUsed);
                    else if (stock < 30 && pending > 10) orderQty = Math.min(60, warehouseCapacity - warehouseUsed);
                    
                    const stepRes = await fetch('/step', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: { order_quantities: [orderQty] } })
                    });
                    
                    if (!stepRes.ok) throw new Error('Step failed');
                    const stepData = await stepRes.json();
                    observation = stepData.observation;
                    
                    results.push({
                        day: observation.current_day || 0,
                        stock: stock,
                        pending: pending,
                        fulfilled: observation.total_fulfilled || 0,
                        revenue: `$${observation.current_balance?.toFixed(2) || '0.00'}`,
                        action: `Order: ${orderQty}`
                    });
                    
                    if (stepData.done) break;
                }
                
                // Display results
                const tbody = document.getElementById('resultsBody');
                tbody.innerHTML = '';
                results.forEach(r => {
                    tbody.innerHTML += `<tr>
                        <td>${r.day}</td>
                        <td>${r.stock}</td>
                        <td>${r.pending}</td>
                        <td>${r.fulfilled}</td>
                        <td>${r.revenue}</td>
                        <td>${r.action}</td>
                    </tr>`;
                });
                
                const finalFulfilled = observation.total_fulfilled || 0;
                const finalDemand = observation.total_demand || 1;
                const fulfillmentRate = (finalFulfilled / finalDemand * 100).toFixed(1);
                
                document.getElementById('summaryDiv').innerHTML = `
                    <strong>✅ Simulation Complete!</strong><br>
                    Total Fulfilled: ${finalFulfilled}/${finalDemand} (${fulfillmentRate}%)<br>
                    Final Revenue: $${observation.current_balance?.toFixed(2)}<br>
                    Simulation Days: ${observation.current_day || 0}
                `;
                
                document.getElementById('resultsDiv').style.display = 'block';
            } catch (error) {
                document.getElementById('errorDiv').innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            } finally {
                document.getElementById('loadingDiv').style.display = 'none';
            }
        }
    </script>
</body>
</html>
