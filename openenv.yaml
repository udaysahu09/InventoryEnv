name: InventoryEnv
version: 1.0.0
description: |
  InventoryEnv: A B2B supply chain agent managing an e-commerce warehouse.
  
  The agent must handle inventory levels of products, fulfill pending customer orders,
  and manage warehouse capacity. Three difficulty levels are available:
  
  - Easy: Manage 1 product (fixed demand), prevent Out of Stock (OOS)
  - Medium: Manage 3 products with warehouse capacity limit, avoid overstock penalties and OOS
  - Hard: Handle 3 products with seasonal demand spikes and random supplier delays, maximize profit
  
  The grader returns a normalized reward strictly between 0.0 and 1.0 based on the
  percentage of fulfilled orders and penalties for OOS and overstock conditions.

author: Meta Scaler Hackathon Participant
organization: Meta
tags:
  - supply-chain
  - inventory-management
  - reinforcement-learning
  - b2b

endpoints:
  root:
    path: /
    method: GET
    description: Health check endpoint
    response:
      status: HTTP 200 OK
      body:
        status: ok
        message: InventoryEnv API is running
        version: 1.0.0

  reset:
    path: /reset
    method: POST
    description: Reset the environment to initial state
    parameters:
      - name: task
        type: string
        description: Task difficulty level (easy, medium, hard)
        enum: [easy, medium, hard]
    response:
      observation:
        current_day: int
        stock_levels: List[int]
        warehouse_capacity: int
        warehouse_used: int
        pending_orders: List[int]
        total_fulfilled: int
        total_demand: int
        current_balance: float
        task: string

  step:
    path: /step
    method: POST
    description: Execute one step in the environment
    parameters:
      - name: action
        type: object
        description: Action with order quantities for each product
        properties:
          order_quantities: List[int]
    response:
      observation:
        current_day: int
        stock_levels: List[int]
        warehouse_capacity: int
        warehouse_used: int
        pending_orders: List[int]
        total_fulfilled: int
        total_demand: int
        current_balance: float
        task: string
      reward:
        reward: float
        fulfilled_percentage: float
        oos_penalty: float
        storage_cost: float
        order_cost: float
        total_revenue: float
        done: bool
      done: bool

  state:
    path: /state
    method: GET
    description: Get the current environment state
    response:
      observation:
        current_day: int
        stock_levels: List[int]
        warehouse_capacity: int
        warehouse_used: int
        pending_orders: List[int]
        total_fulfilled: int
        total_demand: int
        current_balance: float
        task: string
      reward:
        reward: float
        fulfilled_percentage: float
        oos_penalty: float
        storage_cost: float
        order_cost: float
        total_revenue: float
        done: bool
      done: bool

tasks:
  - name: easy
    description: |
      Manage 1 product with fixed demand pattern.
      Objective: Prevent Out of Stock (OOS) while managing inventory efficiently.
      Duration: 100 days
      Warehouse Capacity: 200 units
      Success Metric: Fulfill >= 90% of orders
    difficulty: easy
    max_steps: 100

  - name: medium
    description: |
      Manage 3 products with strict warehouse capacity limit (300 units).
      Objective: Balance inventory across products, avoid overstock penalties and OOS.
      Duration: 100 days
      Warehouse Capacity: 300 units (shared across all products)
      Success Metric: Fulfill >= 85% of orders while keeping storage costs low
    difficulty: medium
    max_steps: 100

  - name: hard
    description: |
      Manage 3 products with seasonal demand spikes and random supplier delays (1-3 days).
      Objective: Maximize profit (Sales revenue - storage costs - order costs).
      Duration: 100 days
      Warehouse Capacity: 300 units (shared across all products)
      Demand Pattern: Seasonal peaks at days 30-40 and 70-80 with 1.5x multiplier
      Supplier Delays: 20% chance of 1-3 day delay on each order
      Success Metric: Achieve highest profit while maintaining high fulfillment rate
    difficulty: hard
    max_steps: 100

observation_space:
  type: object
  properties:
    current_day:
      type: integer
      description: Current simulation day (0 to max_days)
    stock_levels:
      type: array
      items: integer
      description: Current stock level for each product
    warehouse_capacity:
      type: integer
      description: Total warehouse capacity in units
    warehouse_used:
      type: integer
      description: Current warehouse space used
    pending_orders:
      type: array
      items: integer
      description: Unfulfilled orders for each product
    total_fulfilled:
      type: integer
      description: Total orders fulfilled so far
    total_demand:
      type: integer
      description: Total order demand generated so far
    current_balance:
      type: number
      description: Current account balance (revenue - costs)
    task:
      type: string
      enum: [easy, medium, hard]
      description: Current task difficulty level

action_space:
  type: object
  properties:
    order_quantities:
      type: array
      items:
        type: integer
        minimum: 0
      description: Quantity to order for each product (non-negative integers)
  required:
    - order_quantities

reward_space:
  type: object
  properties:
    reward:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Normalized reward (0.0 to 1.0)
    fulfilled_percentage:
      type: number
      description: Percentage of orders fulfilled (0.0 to 100.0)
    oos_penalty:
      type: number
      description: Out-of-stock penalty applied
    storage_cost:
      type: number
      description: Storage cost for current inventory
    order_cost:
      type: number
      description: Cost of orders placed
    total_revenue:
      type: number
      description: Total revenue from fulfilled orders
    done:
      type: boolean
      description: Whether episode is complete